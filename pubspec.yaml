name: vaultx
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_storage: ^13.0.5
  shared_preferences: ^2.2.2
  lottie: ^3.1.0
  file_picker: ^8.0.0
  camera: ^0.11.0+2
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  firebase_core: ^4.3.0
  flutter_bloc: ^9.1.1
  firebase_auth: ^6.1.3
  country_code_picker: ^3.0.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.1.1
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  open_filex: ^4.4.0
  flutter_pdfview: ^1.3.2






  # firebase_core: ^3.6.0
  # firebase_auth: ^5.3.1
  # google_sign_in: ^6.2.1
  # local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0E1624"
  adaptive_icon_foreground: assets/icon/app_icon.png
